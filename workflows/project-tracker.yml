name: Update Project Item Assignee Table

on:
  project_item:
    types: [edited]
workflow_dispatch {}:
jobs:
  update-table:
    runs-on: ubuntu-latest
    # Essential permissions to read/write the Project GraphQL data
    permissions:
      repository-projects: write
      issues: write
    steps:
      - name: Check and Update Description Table
        uses: actions/github-script@v7
        with:
	  github-token: ${{ secrets.ORG_PROJECT_AUTOMATION_PAT }}
          script: |
            const item = context.payload.project_item;
            
            // Exit early if the changes aren't related to field updates
            if (!item) return;

            // Fetch full details of the project item using GraphQL (works for both Drafts and Issues)
            const query = `
              query($id: ID!) {
                node(id: $id) {
                  ... on ProjectV2Item {
                    id
                    content {
                      ... on DraftIssue {
                        title
                        body
                      }
                      ... on Issue {
                        title
                        body
                        number
                        repository {
                          name
                          owner { login }
                        }
                      }
                    }
                    fieldValues(first: 50) {
                      nodes {
                        ... on ProjectV2ItemFieldUserValue {
                          users(first: 10) {
                            nodes {
                              login
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;
            
            const result = await github.graphql(query, { id: item.node_id });
            const projectItem = result.node;
            if (!projectItem || !projectItem.content) return;

            // Extract existing description body
            let currentBody = projectItem.content.body || "";
            
            // Extract all currently assigned users from the project item
            const userNodes = projectItem.fieldValues.nodes.find(n => n.users)?.users?.nodes || [];
            const assignees = userNodes.map(u => `@${u.login}`);

            if (assignees.length === 0) return; // No one assigned yet

            // Table Identifier Marker
            const marker = "\n\n### ⏱️ Assignment Time Tracker";
            
            // Strip out the existing table if it's already there to prevent duplicates
            if (currentBody.includes(marker)) {
              currentBody = currentBody.split(marker)[0];
            }

            // Build the fresh Markdown table structure
            let table = `${marker}\n| Assignee | Time Spent (Minutes) |\n| :--- | :--- |\n`;
            
            assignees.forEach(user => {
              table += `| ${user} | 0 |\n`;
            });

            const updatedBody = `${currentBody.trim()}${table}`;

            // Update the Draft or Issue depending on what type of item it is
            if (projectItem.content.__typename === "DraftIssue") {
              const updateDraftMutation = `
                mutation($id: ID!, $body: String!) {
                  updateProjectV2DraftIssue(input: {draftIssueId: $id, body: $body}) {
                    draftIssue { id }
                  }
                }
              `;
              // For drafts, we target the internal content ID
              const draftId = item.content_node_id; 
              await github.graphql(updateDraftMutation, { id: draftId, body: updatedBody });
              console.log("Successfully updated Draft Issue table.");
            } else if (projectItem.content.__typename === "Issue") {
              // For standard issues, we can use the cleaner Rest API
              await github.rest.issues.update({
                owner: projectItem.content.repository.owner.login,
                repo: projectItem.content.repository.name,
                issue_number: projectItem.content.number,
                body: updatedBody
              });
              console.log("Successfully updated standard Issue description table.");
            }
